<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- ═══ SNIPER — "Tripé Longo" ═══ -->
  <!-- Cor-âncora: Azul-aço (#3A5A7C) com lente âmbar-laranja -->
  <!-- Corpo ultra-fino e alto, 4 pernas de tripé, luneta giratória enorme -->

  <!-- ═══ 4 PERNAS DE TRIPÉ (longas e finas) ═══ -->
  <!-- Perna frontal esquerda -->
  <line x1="28" y1="40" x2="14" y2="62" stroke="#2A4A6A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Perna frontal direita -->
  <line x1="36" y1="40" x2="50" y2="62" stroke="#2A4A6A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Perna traseira esquerda -->
  <line x1="29" y1="41" x2="18" y2="58" stroke="#2A4A6A" stroke-width="2" stroke-linecap="round"/>
  <!-- Perna traseira direita -->
  <line x1="35" y1="41" x2="46" y2="58" stroke="#2A4A6A" stroke-width="2" stroke-linecap="round"/>

  <!-- Travas de estabilização nas pernas -->
  <line x1="18" y1="53" x2="25" y2="50" stroke="#3A5A7C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="53" x2="39" y2="50" stroke="#3A5A7C" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pés (suportes de borracha/metal) -->
  <ellipse cx="14" cy="62" rx="3.5" ry="2" fill="#1A2A3A" stroke="#0A1A2A" stroke-width="1"/>
  <ellipse cx="50" cy="62" rx="3.5" ry="2" fill="#1A2A3A" stroke="#0A1A2A" stroke-width="1"/>
  <ellipse cx="18" cy="58" rx="3" ry="1.5" fill="#1A2A3A" stroke="#0A1A2A" stroke-width="1"/>
  <ellipse cx="46" cy="58" rx="3" ry="1.5" fill="#1A2A3A" stroke="#0A1A2A" stroke-width="1"/>

  <!-- ═══ CORPO CENTRAL FINO ═══ -->
  <!-- Hub central onde as pernas se unem -->
  <circle cx="32" cy="41" r="6" fill="#2A4A6A" stroke="#1A3A5A" stroke-width="2"/>
  <circle cx="32" cy="41" r="3.5" fill="#3A5A7C"/>
  <!-- Parafusos do hub -->
  <circle cx="27" cy="39" r="1.5" fill="#1A3A5A"/>
  <circle cx="37" cy="39" r="1.5" fill="#1A3A5A"/>
  <circle cx="27" cy="43" r="1.5" fill="#1A3A5A"/>
  <circle cx="37" cy="43" r="1.5" fill="#1A3A5A"/>

  <!-- Coluna central (extremamente fina) -->
  <rect x="29" y="14" width="6" height="28" rx="2" fill="#3A5A7C" stroke="#1A3A5A" stroke-width="1.5"/>
  <!-- Detalhes na coluna (segmentos) -->
  <rect x="29" y="18" width="6" height="2" rx="0.5" fill="#4A6A8C" opacity="0.8"/>
  <rect x="29" y="24" width="6" height="2" rx="0.5" fill="#4A6A8C" opacity="0.8"/>
  <rect x="29" y="30" width="6" height="2" rx="0.5" fill="#4A6A8C" opacity="0.8"/>
  <rect x="29" y="36" width="6" height="2" rx="0.5" fill="#4A6A8C" opacity="0.8"/>

  <!-- ═══ CABEÇA — LUNETA GIRATÓRIA ENORME ═══ -->
  <!-- Suporte giratório -->
  <rect x="22" y="8" width="20" height="8" rx="3" fill="#2A4A6A" stroke="#1A3A5A" stroke-width="2"/>
  <!-- Luneta principal (corpo horizontal longo) -->
  <rect x="5" y="6" width="54" height="12" rx="5" fill="#3A5A7C" stroke="#1A3A5A" stroke-width="2"/>
  <!-- Reflexo metálico na luneta -->
  <rect x="6" y="7" width="15" height="10" rx="4" fill="#5A7A9C" opacity="0.4"/>
  <!-- Anéis de ajuste de foco -->
  <rect x="20" y="5" width="6" height="14" rx="2" fill="#2A4A6A" stroke="#1A3A5A" stroke-width="1"/>
  <rect x="38" y="5" width="6" height="14" rx="2" fill="#2A4A6A" stroke="#1A3A5A" stroke-width="1"/>

  <!-- ═══ LENTE PRINCIPAL (âmbar-laranja brilhante) ═══ -->
  <!-- Lado esquerdo da luneta (ocular) -->
  <circle cx="9" cy="12" r="5" fill="#1A1A1A" stroke="#2A4A6A" stroke-width="1.5"/>
  <circle cx="9" cy="12" r="3.5" fill="#0A0A1A"/>
  <circle cx="9" cy="12" r="2" fill="#1A2A3A"/>

  <!-- Lado direito da luneta (LENTE OBJETIVA — enorme âmbar) -->
  <circle cx="55" cy="12" r="7" fill="#1A1A1A" stroke="#CC6622" stroke-width="2"/>
  <!-- Aro âmbar da lente -->
  <circle cx="55" cy="12" r="6" fill="none" stroke="#FF8833" stroke-width="2"/>
  <!-- Interior da lente -->
  <circle cx="55" cy="12" r="5" fill="#1A1A0A"/>
  <!-- Iris da lente (âmbar) -->
  <circle cx="55" cy="12" r="3.5" fill="#CC6622"/>
  <circle cx="55" cy="12" r="2.5" fill="#FF8833"/>
  <!-- Pupila / sensor -->
  <circle cx="55" cy="12" r="1.5" fill="#0A0A0A"/>
  <!-- Brilho da lente âmbar -->
  <circle cx="53" cy="10" r="1.5" fill="#FFCC66" opacity="0.9"/>
  <!-- Glow âmbar ao redor da lente ativa -->
  <circle cx="55" cy="12" r="8" fill="none" stroke="#FF8833" stroke-width="1" opacity="0.4"/>

  <!-- ═══ CANO DE ATAQUE (longo e fino, parte do corpo) ═══ -->
  <!-- Já incluso na própria luneta — o cano É a luneta -->
  <!-- Bocal do cano (ponta da luneta) -->
  <circle cx="59" cy="12" r="3" fill="#2A2A2A" stroke="#FF8833" stroke-width="1.5"/>
  <circle cx="59" cy="12" r="1.5" fill="#0A0A0A"/>

  <!-- ═══ DETALHE: LASER DE MIRA (linha fina vermelha telegrafada) ═══ -->
  <!-- Saindo da ponta do cano — indica que está mirando -->
  <!-- (em jogo este seria um efeito de partícula; aqui apenas um detalhe visual) -->
  <line x1="62" y1="12" x2="64" y2="12" stroke="#FF2222" stroke-width="1" opacity="0.8" stroke-dasharray="1,1"/>

</svg>
