<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Corpo slim: avental medico branco-verde -->
  <rect x="21" y="28" width="22" height="26" rx="4" fill="#E8FFF0" stroke="#1A1A2E" stroke-width="2"/>
  <!-- Cruz medica no peito -->
  <rect x="29" y="32" width="6" height="14" rx="1" fill="#22CC66" stroke="#1A1A2E" stroke-width="0.5"/>
  <rect x="25" y="36" width="14" height="6" rx="1" fill="#22CC66" stroke="#1A1A2E" stroke-width="0.5"/>
  <!-- Pescoço -->
  <rect x="29" y="23" width="6" height="6" rx="2" fill="#F5CBA7" stroke="#1A1A2E" stroke-width="1.5"/>
  <!-- Cabeca suave e amigavel -->
  <ellipse cx="32" cy="15" rx="10" ry="11" fill="#F5CBA7" stroke="#1A1A2E" stroke-width="2"/>
  <!-- Cabelo liso e arrumado -->
  <path d="M22 12 Q32 4 42 12" fill="#2A1A0A" stroke="#1A1A2E" stroke-width="1.5"/>
  <rect x="22" y="8" width="20" height="5" rx="2" fill="#2A1A0A" stroke="#1A1A2E" stroke-width="1"/>
  <!-- Olhos gentis e grandes -->
  <ellipse cx="27" cy="16" rx="3.5" ry="4" fill="white" stroke="#1A1A2E" stroke-width="1"/>
  <ellipse cx="37" cy="16" rx="3.5" ry="4" fill="white" stroke="#1A1A2E" stroke-width="1"/>
  <ellipse cx="27" cy="17" rx="2" ry="2.5" fill="#3A6A3A"/>
  <ellipse cx="37" cy="17" rx="2" ry="2.5" fill="#3A6A3A"/>
  <circle cx="27" cy="15" r="2" fill="#1A1A1A"/>
  <circle cx="37" cy="15" r="2" fill="#1A1A1A"/>
  <circle cx="27.8" cy="14.5" r="0.8" fill="white"/>
  <circle cx="37.8" cy="14.5" r="0.8" fill="white"/>
  <!-- Sorriso gentil -->
  <path d="M28 22 Q32 25 36 22" fill="none" stroke="#CC6644" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bolsa medica no lado (detalhe narrativo) -->
  <rect x="40" y="34" width="8" height="8" rx="2" fill="#22CC66" stroke="#1A1A2E" stroke-width="1.5"/>
  <rect x="42" y="36" width="4" height="4" rx="0.5" fill="white"/>
  <rect x="43.5" y="35" width="1" height="6" rx="0.5" fill="#22CC66"/>
  <rect x="41" y="38" width="6" height="1" rx="0.5" fill="#22CC66"/>
  <!-- Bracos delicados -->
  <rect x="11" y="29" width="10" height="17" rx="4" fill="#E8FFF0" stroke="#1A1A2E" stroke-width="2"/>
  <rect x="43" y="29" width="10" height="17" rx="4" fill="#E8FFF0" stroke="#1A1A2E" stroke-width="2"/>
  <!-- Maos -->
  <circle cx="16" cy="48" r="4" fill="#F5CBA7" stroke="#1A1A2E" stroke-width="1.5"/>
  <circle cx="48" cy="48" r="4" fill="#F5CBA7" stroke="#1A1A2E" stroke-width="1.5"/>
  <!-- Seringa na mao (detalhe) -->
  <rect x="48" y="44" width="2" height="7" rx="1" fill="#AAAAAA" stroke="#555" stroke-width="0.5" transform="rotate(30 49 47)"/>
  <!-- Pernas -->
  <rect x="22" y="53" width="8" height="9" rx="3" fill="#22AA55" stroke="#1A1A2E" stroke-width="2"/>
  <rect x="34" y="53" width="8" height="9" rx="3" fill="#22AA55" stroke="#1A1A2E" stroke-width="2"/>
</svg>
