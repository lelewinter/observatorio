<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="metal_a" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#B0BAC8"/>
      <stop offset="45%" stop-color="#828C9C"/>
      <stop offset="100%" stop-color="#525A6A"/>
    </linearGradient>
    <linearGradient id="metal_b" x1="0" y1="0.2" x2="1" y2="0.8">
      <stop offset="0%" stop-color="#606878"/>
      <stop offset="100%" stop-color="#424A58"/>
    </linearGradient>
    <linearGradient id="metal_c" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#484E5C"/>
      <stop offset="100%" stop-color="#30343E"/>
    </linearGradient>
    <filter id="shard_shadow" x="-15%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="1.5" dy="2.5" stdDeviation="1.2" flood-color="#0D1018" flood-opacity="0.6"/>
    </filter>
  </defs>

  <g filter="url(#shard_shadow)">
    <!-- Main top face (largest, brightest) -->
    <polygon points="7,21 5,14 9,8 15,5 22,6 27,11 25,18 21,23 14,25 8,23" fill="url(#metal_a)"/>
    <!-- Right side face -->
    <polygon points="22,6 27,11 25,18 21,23 22,21 24,16 22,10" fill="url(#metal_b)"/>
    <!-- Bottom shadow face -->
    <polygon points="14,25 8,23 7,21 13,22 19,24" fill="url(#metal_c)"/>
  </g>

  <!-- Clean outline -->
  <polygon points="7,21 5,14 9,8 15,5 22,6 27,11 25,18 21,23 14,25 8,23" fill="none" stroke="#1E2430" stroke-width="1"/>
  <polygon points="22,6 27,11 25,18 21,23 22,21 24,16 22,10" fill="none" stroke="#1E2430" stroke-width="0.7"/>

  <!-- Rivet 1 -->
  <circle cx="12" cy="11" r="2.2" fill="#282E3A"/>
  <circle cx="12" cy="11" r="1.3" fill="#4A5060"/>
  <circle cx="11.3" cy="10.3" r="0.6" fill="#8898A8" opacity="0.7"/>

  <!-- Rivet 2 -->
  <circle cx="20" cy="14" r="2.2" fill="#282E3A"/>
  <circle cx="20" cy="14" r="1.3" fill="#4A5060"/>
  <circle cx="19.3" cy="13.3" r="0.6" fill="#8898A8" opacity="0.7"/>

  <!-- Metal sheen scratches -->
  <line x1="8" y1="13" x2="18" y2="8" stroke="#C8D0E0" stroke-width="1" opacity="0.35" stroke-linecap="round"/>
  <line x1="10" y1="19" x2="22" y2="14" stroke="#C8D0E0" stroke-width="0.7" opacity="0.2" stroke-linecap="round"/>

  <!-- Torn edge highlight -->
  <polyline points="9,8 13,6.5 15,5" fill="none" stroke="#D0D8E8" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
</svg>
