name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz
        run: |
          git clone --depth 1 --branch v4.5.2 https://github.com/jackyzha0/quartz.git quartz-build

      - name: Write custom config
        run: |
          cat > quartz-build/quartz.config.ts << 'CONFIGEOF'
          import { QuartzConfig } from "./quartz/cfg"
          import * as Plugin from "./quartz/plugins"

          const config: QuartzConfig = {
            configuration: {
              pageTitle: "Observatorio",
              pageTitleSuffix: "",
              enableSPA: true,
              enablePopovers: true,
              analytics: null,
              locale: "pt-BR",
              baseUrl: "lelewinter.github.io/observatorio",
              ignorePatterns: ["private", "templates", ".obsidian", "Projects", "PDFs", "Scheduled"],
              defaultDateType: "modified",
              theme: {
                fontOrigin: "googleFonts",
                cdnCaching: true,
                typography: {
                  header: "Inter",
                  body: "Inter",
                  code: "JetBrains Mono",
                },
                colors: {
                  lightMode: {
                    light: "#faf8f8",
                    lightgray: "#e5e5e5",
                    gray: "#b8b8b8",
                    darkgray: "#4e4e4e",
                    dark: "#2b2b2b",
                    secondary: "#284b63",
                    tertiary: "#84a59d",
                    highlight: "rgba(143, 159, 169, 0.15)",
                    textHighlight: "#fff23688",
                  },
                  darkMode: {
                    light: "#161618",
                    lightgray: "#393639",
                    gray: "#646464",
                    darkgray: "#d4d4d4",
                    dark: "#ebebec",
                    secondary: "#7b97aa",
                    tertiary: "#84a59d",
                    highlight: "rgba(143, 159, 169, 0.15)",
                    textHighlight: "#fff23688",
                  },
                },
              },
            },
            plugins: {
              transformers: [
                Plugin.FrontMatter(),
                Plugin.CreatedModifiedDate({ priority: ["frontmatter", "filesystem"] }),
                Plugin.SyntaxHighlighting({ theme: { light: "github-light", dark: "github-dark" } }),
                Plugin.ObsidianFlavoredMarkdown({ enableInHtmlBlock: false }),
                Plugin.GitHubFlavoredMarkdown(),
                Plugin.TableOfContents(),
                Plugin.CrawlLinks({ markdownLinkResolution: "shortest" }),
                Plugin.Description(),
                Plugin.Latex({ renderEngine: "katex" }),
              ],
              filters: [Plugin.RemoveDrafts()],
              emitters: [
                Plugin.AliasRedirects(),
                Plugin.ComponentResources(),
                Plugin.ContentPage(),
                Plugin.FolderPage(),
                Plugin.TagPage(),
                Plugin.ContentIndex({ enableSiteMap: true, enableRSSFeed: true }),
                Plugin.Assets(),
                Plugin.Static(),
                Plugin.NotFoundPage(),
              ],
            },
          }

          export default config
          CONFIGEOF

      - name: Sync vault content
        run: |
          CONTENT_DIR="quartz-build/content"
          mkdir -p "$CONTENT_DIR"

          cp -r "Links Salvos" "$CONTENT_DIR/" 2>/dev/null || true
          cp -r "Conceitos" "$CONTENT_DIR/" 2>/dev/null || true
          cp -r "MOCs" "$CONTENT_DIR/" 2>/dev/null || true

          cat > "$CONTENT_DIR/index.md" << 'INDEXEOF'
          ---
          title: Observatorio
          ---
          # Observatorio

          Base de conhecimento pessoal.
          INDEXEOF

          echo "Content synced. Files:"
          find "$CONTENT_DIR" -name "*.md" | wc -l

      - name: Install Dependencies
        run: npm ci
        working-directory: quartz-build

      - name: Build Quartz
        run: npx quartz build
        working-directory: quartz-build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz-build/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
