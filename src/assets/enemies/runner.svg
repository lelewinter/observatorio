<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- ═══ RUNNER — "Lata-Veloz" ═══ -->
  <!-- Cor-âncora: Laranja-enferrujado (#C4622D) -->

  <!-- ═══ PERNAS DE ARAME (finas, longas, dobradas) ═══ -->
  <!-- Perna esquerda - dobrada para trás (correndo) -->
  <line x1="25" y1="42" x2="18" y2="54" stroke="#8A3A1A" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="54" x2="22" y2="62" stroke="#8A3A1A" stroke-width="3" stroke-linecap="round"/>
  <!-- Perna direita - dobrada para frente (correndo) -->
  <line x1="34" y1="42" x2="42" y2="52" stroke="#8A3A1A" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="52" x2="38" y2="62" stroke="#8A3A1A" stroke-width="3" stroke-linecap="round"/>

  <!-- ═══ CORPO — lata de conserva minúscula ═══ -->
  <!-- Corpo inclinado para frente (correndo) -->
  <rect x="19" y="28" width="22" height="16" rx="4" fill="#C4622D" stroke="#6A2A0A" stroke-width="2" transform="rotate(-12 30 36)"/>
  <!-- Textura de ferrugem no corpo -->
  <ellipse cx="24" cy="35" rx="3" ry="2" fill="#8A3A1A" opacity="0.5"/>
  <ellipse cx="34" cy="32" rx="2" ry="2.5" fill="#8A3A1A" opacity="0.4"/>
  <!-- Rebites nas laterais -->
  <circle cx="21" cy="32" r="1.5" fill="#6A2A0A"/>
  <circle cx="38" cy="32" r="1.5" fill="#6A2A0A"/>
  <circle cx="21" cy="38" r="1.5" fill="#6A2A0A"/>
  <circle cx="38" cy="38" r="1.5" fill="#6A2A0A"/>
  <!-- Tampa inferior da lata -->
  <ellipse cx="29" cy="44" rx="11" ry="3" fill="#B05520" stroke="#6A2A0A" stroke-width="1.5"/>
  <!-- Rótulo desbotado na lata -->
  <rect x="22" y="33" width="14" height="5" rx="1" fill="#D4856A" opacity="0.4"/>

  <!-- ═══ PESCOÇO FINO ═══ -->
  <rect x="27" y="20" width="5" height="9" rx="2" fill="#8A3A1A" stroke="#6A2A0A" stroke-width="1"/>

  <!-- ═══ CABEÇA — lâmpada incandescente velha ═══ -->
  <!-- Base metálica da lâmpada -->
  <rect x="25" y="18" width="9" height="4" rx="1" fill="#6A6A6A" stroke="#4A4A4A" stroke-width="1"/>
  <!-- Rosca da base -->
  <rect x="26" y="16" width="7" height="3" rx="0.5" fill="#8A8A7A" stroke="#4A4A4A" stroke-width="0.5"/>
  <line x1="26" y1="17" x2="33" y2="17" stroke="#4A4A4A" stroke-width="0.5"/>
  <line x1="26" y1="18" x2="33" y2="18" stroke="#4A4A4A" stroke-width="0.5"/>
  <!-- Bulbo da lâmpada (vidro translúcido) -->
  <ellipse cx="29" cy="9" rx="8" ry="9" fill="#FFCC66" opacity="0.85" stroke="#C4622D" stroke-width="1.5"/>
  <!-- Filamento interior visível -->
  <path d="M26 12 Q29 8 32 12 Q29 10 26 12" fill="none" stroke="#FF8800" stroke-width="1.2" opacity="0.9"/>
  <!-- Brilho quente da lâmpada ativa -->
  <ellipse cx="29" cy="9" rx="5" ry="6" fill="#FFE566" opacity="0.5"/>
  <circle cx="27" cy="7" r="2" fill="white" opacity="0.6"/>
  <!-- Halo de luz âmbar ao redor -->
  <ellipse cx="29" cy="9" rx="11" ry="12" fill="#FFAA22" opacity="0.12"/>

  <!-- ═══ DETALHES DE MOVIMENTO — inclinação e velocidade ═══ -->
  <!-- Junta da perna esquerda (parafuso) -->
  <circle cx="25" cy="42" r="2.5" fill="#6A3A1A" stroke="#4A2A0A" stroke-width="1"/>
  <!-- Junta da perna direita (parafuso) -->
  <circle cx="34" cy="42" r="2.5" fill="#6A3A1A" stroke="#4A2A0A" stroke-width="1"/>
  <!-- Pés: chapas metálicas -->
  <ellipse cx="22" cy="62" rx="4" ry="2" fill="#6A3A1A" stroke="#4A2A0A" stroke-width="1"/>
  <ellipse cx="38" cy="62" rx="4" ry="2" fill="#6A3A1A" stroke="#4A2A0A" stroke-width="1"/>

</svg>
