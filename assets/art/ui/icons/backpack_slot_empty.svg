<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#1C1430"/>
      <stop offset="100%" stop-color="#090611"/>
    </radialGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9055D8"/>
      <stop offset="100%" stop-color="#4A1E80"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow -->
  <rect x="2.5" y="3.5" width="28" height="28" rx="5" fill="#2A0050" opacity="0.35"/>

  <!-- Background -->
  <rect x="1" y="1" width="30" height="30" rx="5" fill="url(#bg)"/>

  <!-- Outer border -->
  <rect x="1" y="1" width="30" height="30" rx="5" fill="none" stroke="url(#border)" stroke-width="1.5"/>

  <!-- Inner inset rim -->
  <rect x="3.5" y="3.5" width="25" height="25" rx="3.5" fill="none" stroke="#2D1555" stroke-width="0.8"/>

  <!-- Corner bracket TL -->
  <polyline points="4,10 4,4 10,4" fill="none" stroke="#A065E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Corner bracket TR -->
  <polyline points="22,4 28,4 28,10" fill="none" stroke="#A065E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Corner bracket BL -->
  <polyline points="4,22 4,28 10,28" fill="none" stroke="#A065E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Corner bracket BR -->
  <polyline points="22,28 28,28 28,22" fill="none" stroke="#A065E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center empty indicator dots -->
  <circle cx="16" cy="16" r="1.8" fill="#2D1555" opacity="0.9"/>
  <circle cx="11.5" cy="16" r="0.9" fill="#2D1555" opacity="0.5"/>
  <circle cx="20.5" cy="16" r="0.9" fill="#2D1555" opacity="0.5"/>
</svg>
