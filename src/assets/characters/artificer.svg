<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Corpo redondo: barril/bomba -->
  <ellipse cx="32" cy="40" rx="16" ry="18" fill="#7B3FA0" stroke="#1A1A2E" stroke-width="2"/>
  <!-- Detalhes do barril: aros -->
  <ellipse cx="32" cy="34" rx="14" ry="4" fill="none" stroke="#9B5FC0" stroke-width="1.5"/>
  <ellipse cx="32" cy="44" rx="14" ry="4" fill="none" stroke="#9B5FC0" stroke-width="1.5"/>
  <!-- Painel central: display de explosoes -->
  <rect x="24" y="36" width="16" height="10" rx="2" fill="#3A004A" stroke="#C080FF" stroke-width="1"/>
  <path d="M28 46 L30 40 L32 43 L34 37 L36 46 Z" fill="#FF4444" opacity="0.8"/>
  <!-- Pescoço gorducho -->
  <rect x="27" y="22" width="10" height="7" rx="3" fill="#E8D5C0" stroke="#1A1A2E" stroke-width="1.5"/>
  <!-- Cabeca com goggles enormes -->
  <ellipse cx="32" cy="15" rx="12" ry="11" fill="#5A2A7A" stroke="#1A1A2E" stroke-width="2"/>
  <!-- Cabelo cacheado roxo -->
  <path d="M20 11 Q22 4 28 7 Q32 3 36 7 Q42 4 44 11" fill="#3A0A5A" stroke="#1A1A2E" stroke-width="1.5"/>
  <!-- Goggles grandes (traço marcante) -->
  <rect x="19" y="13" width="12" height="8" rx="4" fill="#FF8800" stroke="#1A1A2E" stroke-width="1.5"/>
  <rect x="33" y="13" width="12" height="8" rx="4" fill="#FF8800" stroke="#1A1A2E" stroke-width="1.5"/>
  <line x1="31" y1="17" x2="33" y2="17" stroke="#1A1A2E" stroke-width="1.5"/>
  <!-- Lentes dos goggles -->
  <ellipse cx="25" cy="17" rx="4" ry="3" fill="#FFD700" opacity="0.9"/>
  <ellipse cx="39" cy="17" rx="4" ry="3" fill="#FFD700" opacity="0.9"/>
  <circle cx="24" cy="16" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="38" cy="16" r="1.2" fill="white" opacity="0.7"/>
  <!-- Sorriso malicioso -->
  <path d="M27 23 Q32 27 37 23" fill="none" stroke="#1A1A2E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bracos curtos e robustos -->
  <rect x="9" y="32" width="9" height="14" rx="4" fill="#7B3FA0" stroke="#1A1A2E" stroke-width="2"/>
  <rect x="46" y="32" width="9" height="14" rx="4" fill="#7B3FA0" stroke="#1A1A2E" stroke-width="2"/>
  <!-- Maos com luvas de explosivo -->
  <circle cx="13" cy="48" r="5" fill="#FF4400" stroke="#1A1A2E" stroke-width="1.5"/>
  <circle cx="51" cy="48" r="5" fill="#FF4400" stroke="#1A1A2E" stroke-width="1.5"/>
  <!-- Mecha/engrenagem nas maos -->
  <circle cx="13" cy="48" r="2" fill="#FFAA00" stroke="#1A1A2E" stroke-width="1"/>
  <circle cx="51" cy="48" r="2" fill="#FFAA00" stroke="#1A1A2E" stroke-width="1"/>
  <!-- Pernas curtas -->
  <rect x="22" y="56" width="8" height="7" rx="3" fill="#5A2A7A" stroke="#1A1A2E" stroke-width="2"/>
  <rect x="34" y="56" width="8" height="7" rx="3" fill="#5A2A7A" stroke="#1A1A2E" stroke-width="2"/>
</svg>
