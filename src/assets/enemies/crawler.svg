<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- ═══ CRAWLER — "Centopeia" ═══ -->
  <!-- Cor-âncora: Bronze-envelhecido (#8C6B3E) com juntas de cobre brilhante -->
  <!-- Corpo segmentado, rasteja pelo chão, ondulatório -->

  <!-- ═══ SEGMENTOS DO CORPO (5 módulos, da cauda à cabeça) ═══ -->

  <!-- Segmento 5 — cauda (mais pequeno) -->
  <ellipse cx="58" cy="40" rx="5" ry="6" fill="#7A5A2E" stroke="#4A3A1A" stroke-width="1.5"/>
  <!-- Junta de cobre -->
  <circle cx="53" cy="40" r="3" fill="#B87A3A" stroke="#8A5A1A" stroke-width="1"/>

  <!-- Segmento 4 -->
  <ellipse cx="46" cy="38" rx="6" ry="7" fill="#8C6B3E" stroke="#4A3A1A" stroke-width="1.5"/>
  <!-- Pernas do segmento 4 -->
  <line x1="46" y1="44" x2="42" y2="52" stroke="#6A4A2A" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="44" x2="50" y2="52" stroke="#6A4A2A" stroke-width="2" stroke-linecap="round"/>
  <!-- Junta de cobre -->
  <circle cx="40" cy="38" r="3" fill="#B87A3A" stroke="#8A5A1A" stroke-width="1"/>

  <!-- Segmento 3 -->
  <ellipse cx="32" cy="36" rx="7" ry="8" fill="#9C7B4E" stroke="#4A3A1A" stroke-width="1.5"/>
  <!-- Pernas do segmento 3 -->
  <line x1="32" y1="43" x2="26" y2="52" stroke="#6A4A2A" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="43" x2="38" y2="52" stroke="#6A4A2A" stroke-width="2" stroke-linecap="round"/>
  <!-- Junta de cobre -->
  <circle cx="25" cy="36" r="3.5" fill="#B87A3A" stroke="#8A5A1A" stroke-width="1"/>

  <!-- Segmento 2 -->
  <ellipse cx="18" cy="34" rx="7" ry="8" fill="#9C7B4E" stroke="#4A3A1A" stroke-width="1.5"/>
  <!-- Pernas do segmento 2 -->
  <line x1="18" y1="41" x2="12" y2="52" stroke="#6A4A2A" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="41" x2="24" y2="52" stroke="#6A4A2A" stroke-width="2" stroke-linecap="round"/>
  <!-- Junta de cobre -->
  <circle cx="11" cy="34" r="3.5" fill="#B87A3A" stroke="#8A5A1A" stroke-width="1"/>

  <!-- Pés das pernas -->
  <ellipse cx="42" cy="52" rx="3" ry="1.5" fill="#4A3A1A"/>
  <ellipse cx="50" cy="52" rx="3" ry="1.5" fill="#4A3A1A"/>
  <ellipse cx="26" cy="52" rx="3" ry="1.5" fill="#4A3A1A"/>
  <ellipse cx="38" cy="52" rx="3" ry="1.5" fill="#4A3A1A"/>
  <ellipse cx="12" cy="52" rx="3" ry="1.5" fill="#4A3A1A"/>
  <ellipse cx="24" cy="52" rx="3" ry="1.5" fill="#4A3A1A"/>

  <!-- ═══ SEGMENTO 1 — CABEÇA ═══ -->
  <ellipse cx="6" cy="30" rx="7" ry="9" fill="#8C6B3E" stroke="#4A3A1A" stroke-width="2"/>
  <!-- Perna da cabeça (antena-garra) -->
  <line x1="6" y1="38" x2="2" y2="50" stroke="#6A4A2A" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="2" cy="50" rx="2.5" ry="1.5" fill="#4A3A1A"/>

  <!-- ═══ MANDÍBULA MECÂNICA ═══ -->
  <!-- Mandíbula superior -->
  <path d="M2 31 Q6 28 10 31 L9 34 Q6 31 3 34 Z" fill="#6A4A2E" stroke="#4A2A1A" stroke-width="1"/>
  <!-- Mandíbula inferior -->
  <path d="M2 34 Q6 37 10 34 L9 31 Q6 34 3 31 Z" fill="#5A3A1E" stroke="#4A2A1A" stroke-width="1"/>
  <!-- Dentes metálicos -->
  <line x1="4" y1="32" x2="4" y2="34" stroke="#B87A3A" stroke-width="1.5"/>
  <line x1="6" y1="32" x2="6" y2="34" stroke="#B87A3A" stroke-width="1.5"/>
  <line x1="8" y1="32" x2="8" y2="34" stroke="#B87A3A" stroke-width="1.5"/>

  <!-- ═══ OLHOS — câmeras laterais vermelhas ═══ -->
  <!-- Olho esquerdo (lateral) -->
  <circle cx="2" cy="25" r="3.5" fill="#1A1A1A" stroke="#4A3A1A" stroke-width="1"/>
  <circle cx="2" cy="25" r="2" fill="#AA1111"/>
  <circle cx="2" cy="25" r="1.2" fill="#FF3333"/>
  <circle cx="1.5" cy="24" r="0.6" fill="white" opacity="0.7"/>
  <!-- Olho direito (lateral) -->
  <circle cx="10" cy="25" r="3.5" fill="#1A1A1A" stroke="#4A3A1A" stroke-width="1"/>
  <circle cx="10" cy="25" r="2" fill="#AA1111"/>
  <circle cx="10" cy="25" r="1.2" fill="#FF3333"/>
  <circle cx="9.5" cy="24" r="0.6" fill="white" opacity="0.7"/>

  <!-- ═══ DETALHES DO CORPO — textura bronze ═══ -->
  <!-- Parafusos nos segmentos -->
  <circle cx="32" cy="33" r="1.5" fill="#B87A3A"/>
  <circle cx="18" cy="31" r="1.5" fill="#B87A3A"/>
  <circle cx="46" cy="35" r="1.5" fill="#B87A3A"/>
  <!-- Oxidação/patina nos segmentos -->
  <ellipse cx="35" cy="39" rx="3" ry="2" fill="#6A5A2E" opacity="0.5"/>
  <ellipse cx="20" cy="37" rx="2" ry="3" fill="#6A5A2E" opacity="0.4"/>

  <!-- ═══ ANTENAS NA CABEÇA ═══ -->
  <line x1="4" y1="22" x2="1" y2="15" stroke="#B87A3A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="22" x2="11" y2="15" stroke="#B87A3A" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="1" cy="15" r="2" fill="#D4922A"/>
  <circle cx="11" cy="15" r="2" fill="#D4922A"/>

</svg>
