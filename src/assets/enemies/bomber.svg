<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- ═══ BOMBER — "Pinguim" ═══ -->
  <!-- Cor-âncora: Preto-fosco (#2A2A2A) + laranja-néon (#FF6B35) -->
  <!-- Corpo bojudo de pinguim, barriga com janela de bombas visíveis -->

  <!-- ═══ PERNAS CURTAS (andar cômica) ═══ -->
  <rect x="22" y="52" width="8" height="10" rx="3" fill="#1A1A1A" stroke="#0A0A0A" stroke-width="1.5"/>
  <rect x="34" y="52" width="8" height="10" rx="3" fill="#1A1A1A" stroke="#0A0A0A" stroke-width="1.5"/>
  <!-- Pés largos de pinguim -->
  <ellipse cx="26" cy="62" rx="7" ry="2.5" fill="#2A2A2A" stroke="#0A0A0A" stroke-width="1"/>
  <ellipse cx="38" cy="62" rx="7" ry="2.5" fill="#2A2A2A" stroke="#0A0A0A" stroke-width="1"/>

  <!-- ═══ CORPO BOJUDO ═══ -->
  <!-- Corpo principal (oval largo e arredondado — pinguim) -->
  <ellipse cx="32" cy="38" rx="18" ry="20" fill="#2A2A2A" stroke="#0A0A0A" stroke-width="2.5"/>
  <!-- Barriga branca/cinza (frente do pinguim) -->
  <ellipse cx="32" cy="40" rx="12" ry="15" fill="#3A3A3A" stroke="#1A1A1A" stroke-width="1"/>

  <!-- ═══ JANELA DE VIDRO NA BARRIGA (bombas visíveis) ═══ -->
  <!-- Moldura da janela — laranja néon -->
  <rect x="23" y="33" width="18" height="16" rx="4" fill="#FF6B35" stroke="#CC4A1A" stroke-width="1.5"/>
  <!-- Vidro interior -->
  <rect x="24" y="34" width="16" height="14" rx="3" fill="#1A1A2A" opacity="0.9"/>
  <!-- Reflexo do vidro -->
  <rect x="25" y="35" width="5" height="12" rx="2" fill="white" opacity="0.1"/>
  <!-- Bomba 1 (esfera vermelha pulsante - interior) -->
  <circle cx="29" cy="41" r="4" fill="#CC1111"/>
  <circle cx="29" cy="41" r="3" fill="#EE2222"/>
  <circle cx="27.5" cy="39.5" r="1" fill="#FF6666" opacity="0.8"/>
  <!-- Mecha da bomba 1 -->
  <line x1="29" y1="37" x2="30" y2="35" stroke="#FF8800" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="30" cy="34.5" r="1" fill="#FFCC00"/>
  <!-- Bomba 2 (esfera vermelha) -->
  <circle cx="36" cy="42" r="3.5" fill="#CC1111"/>
  <circle cx="36" cy="42" r="2.5" fill="#EE2222"/>
  <circle cx="34.8" cy="40.8" r="0.8" fill="#FF6666" opacity="0.8"/>
  <!-- Mecha da bomba 2 -->
  <line x1="36" y1="38.5" x2="37" y2="36" stroke="#FF8800" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="37" cy="35.5" r="1" fill="#FFCC00"/>
  <!-- Glow interno pulsante (laranja quente) -->
  <rect x="24" y="34" width="16" height="14" rx="3" fill="#FF6B35" opacity="0.1"/>

  <!-- ═══ BRAÇOS PEQUENOS (inofensivos visualmente) ═══ -->
  <!-- Braço esquerdo -->
  <rect x="8" y="32" width="10" height="14" rx="4" fill="#2A2A2A" stroke="#0A0A0A" stroke-width="1.5"/>
  <!-- Detalhe laranja no braço -->
  <line x1="10" y1="38" x2="16" y2="38" stroke="#FF6B35" stroke-width="1.5" opacity="0.7"/>
  <!-- Braço direito -->
  <rect x="46" y="32" width="10" height="14" rx="4" fill="#2A2A2A" stroke="#0A0A0A" stroke-width="1.5"/>
  <line x1="48" y1="38" x2="54" y2="38" stroke="#FF6B35" stroke-width="1.5" opacity="0.7"/>

  <!-- ═══ CABEÇA ═══ -->
  <!-- Pescoço sem pescoço — pinguim -->
  <ellipse cx="32" cy="20" rx="12" ry="11" fill="#2A2A2A" stroke="#0A0A0A" stroke-width="2"/>
  <!-- Barriga/mancha branca da cabeça (frente) -->
  <ellipse cx="32" cy="21" rx="7" ry="7" fill="#3A3A3A"/>

  <!-- ═══ OLHOS — câmeras retangulares laranja ═══ -->
  <!-- Olho esquerdo (câmera piscando laranja) -->
  <rect x="23" y="16" width="8" height="7" rx="2" fill="#1A1A1A" stroke="#FF6B35" stroke-width="1.5"/>
  <rect x="24" y="17" width="6" height="5" rx="1" fill="#FF6B35" opacity="0.8"/>
  <!-- LED da câmera -->
  <circle cx="25" cy="18" r="1" fill="#FFAA00"/>
  <!-- Olho direito -->
  <rect x="33" y="16" width="8" height="7" rx="2" fill="#1A1A1A" stroke="#FF6B35" stroke-width="1.5"/>
  <rect x="34" y="17" width="6" height="5" rx="1" fill="#FF6B35" opacity="0.8"/>
  <circle cx="35" cy="18" r="1" fill="#FFAA00"/>

  <!-- ═══ BOCAL / BICO (detalhe cômico) ═══ -->
  <path d="M29 26 Q32 29 35 26" fill="none" stroke="#FF6B35" stroke-width="2" stroke-linecap="round"/>

  <!-- ═══ DETALHES NÉON NO CORPO ═══ -->
  <!-- Tiras laranja néon (iluminação de alerta) -->
  <line x1="14" y1="42" x2="14" y2="50" stroke="#FF6B35" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="50" y1="42" x2="50" y2="50" stroke="#FF6B35" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <!-- Parafusos decorativos -->
  <circle cx="15" cy="34" r="2" fill="#1A1A1A" stroke="#FF6B35" stroke-width="1"/>
  <circle cx="49" cy="34" r="2" fill="#1A1A1A" stroke="#FF6B35" stroke-width="1"/>

</svg>
