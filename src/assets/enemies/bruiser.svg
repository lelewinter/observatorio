<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- ═══ BRUISER — "Barril" ═══ -->
  <!-- Cor-âncora: Cinza-chumbo (#5A5A6E) com rebites âmbar -->

  <!-- ═══ PERNAS CILÍNDRICAS CURTAS ═══ -->
  <rect x="17" y="50" width="11" height="10" rx="3" fill="#4A4A5E" stroke="#2A2A3A" stroke-width="2"/>
  <rect x="36" y="50" width="11" height="10" rx="3" fill="#4A4A5E" stroke="#2A2A3A" stroke-width="2"/>
  <!-- Rodas/pés pesados -->
  <ellipse cx="22" cy="61" rx="7" ry="3" fill="#2A2A3A" stroke="#1A1A2A" stroke-width="1"/>
  <ellipse cx="41" cy="61" rx="7" ry="3" fill="#2A2A3A" stroke="#1A1A2A" stroke-width="1"/>

  <!-- ═══ CORPO BARRIL INDUSTRIAL ═══ -->
  <!-- Barril principal -->
  <rect x="10" y="22" width="44" height="30" rx="6" fill="#5A5A6E" stroke="#2A2A3A" stroke-width="2.5"/>
  <!-- Aros metálicos do barril (reforços horizontais) -->
  <rect x="10" y="28" width="44" height="4" rx="0" fill="#6A6A7E" stroke="#3A3A4E" stroke-width="1"/>
  <rect x="10" y="38" width="44" height="4" rx="0" fill="#6A6A7E" stroke="#3A3A4E" stroke-width="1"/>
  <rect x="10" y="47" width="44" height="3" rx="0" fill="#6A6A7E" stroke="#3A3A4E" stroke-width="1"/>
  <!-- Amassados e danos no barril -->
  <path d="M14 33 Q16 30 18 33 Q16 35 14 33" fill="#4A4A5E" opacity="0.7"/>
  <path d="M45 40 Q48 37 50 40 Q48 43 45 40" fill="#4A4A5E" opacity="0.7"/>
  <!-- Ferrugem nos lados -->
  <ellipse cx="13" cy="44" rx="3" ry="5" fill="#7A5A3A" opacity="0.4"/>
  <ellipse cx="51" cy="30" rx="3" ry="4" fill="#7A5A3A" opacity="0.3"/>
  <!-- Rebites ÂMBAR ao longo dos aros -->
  <circle cx="14" cy="30" r="2" fill="#C4922D"/>
  <circle cx="24" cy="30" r="2" fill="#C4922D"/>
  <circle cx="34" cy="30" r="2" fill="#C4922D"/>
  <circle cx="44" cy="30" r="2" fill="#C4922D"/>
  <circle cx="14" cy="40" r="2" fill="#C4922D"/>
  <circle cx="24" cy="40" r="2" fill="#C4922D"/>
  <circle cx="34" cy="40" r="2" fill="#C4922D"/>
  <circle cx="44" cy="40" r="2" fill="#C4922D"/>
  <!-- Marcação industrial no barril -->
  <rect x="22" y="32" width="20" height="8" rx="2" fill="#4A4A5E" stroke="#3A3A4E" stroke-width="1" opacity="0.8"/>
  <line x1="24" y1="35" x2="40" y2="35" stroke="#C4922D" stroke-width="1" opacity="0.6"/>
  <line x1="24" y1="37" x2="36" y2="37" stroke="#C4922D" stroke-width="1" opacity="0.4"/>

  <!-- ═══ BRAÇOS CURTOS E GROSSOS (pistões hidráulicos) ═══ -->
  <!-- Braço esquerdo -->
  <rect x="1" y="25" width="10" height="16" rx="3" fill="#5A5A6E" stroke="#2A2A3A" stroke-width="2"/>
  <!-- Pistão interno visível -->
  <rect x="3" y="28" width="6" height="8" rx="1" fill="#8A8A9E" opacity="0.6"/>
  <rect x="4" y="30" width="4" height="4" rx="1" fill="#AAAAAA" opacity="0.5"/>
  <!-- Parafuso da junta -->
  <circle cx="10" cy="25" r="2.5" fill="#C4922D" stroke="#8A5A1A" stroke-width="1"/>
  <circle cx="10" cy="41" r="2.5" fill="#C4922D" stroke="#8A5A1A" stroke-width="1"/>
  <!-- Mão/garra esquerda -->
  <rect x="0" y="38" width="8" height="7" rx="2" fill="#3A3A4E" stroke="#2A2A3A" stroke-width="1.5"/>

  <!-- Braço direito -->
  <rect x="53" y="25" width="10" height="16" rx="3" fill="#5A5A6E" stroke="#2A2A3A" stroke-width="2"/>
  <!-- Pistão interno -->
  <rect x="55" y="28" width="6" height="8" rx="1" fill="#8A8A9E" opacity="0.6"/>
  <rect x="56" y="30" width="4" height="4" rx="1" fill="#AAAAAA" opacity="0.5"/>
  <!-- Parafuso da junta -->
  <circle cx="54" cy="25" r="2.5" fill="#C4922D" stroke="#8A5A1A" stroke-width="1"/>
  <circle cx="54" cy="41" r="2.5" fill="#C4922D" stroke="#8A5A1A" stroke-width="1"/>
  <!-- Mão/garra direita -->
  <rect x="56" y="38" width="8" height="7" rx="2" fill="#3A3A4E" stroke="#2A2A3A" stroke-width="1.5"/>

  <!-- ═══ CABEÇA PEQUENA (desproporcional ao corpo) ═══ -->
  <rect x="22" y="10" width="20" height="14" rx="4" fill="#4A4A5E" stroke="#2A2A3A" stroke-width="2"/>
  <!-- Orelhas/antenas laterais -->
  <rect x="18" y="13" width="5" height="3" rx="1" fill="#3A3A4E" stroke="#2A2A3A" stroke-width="1"/>
  <rect x="41" y="13" width="5" height="3" rx="1" fill="#3A3A4E" stroke="#2A2A3A" stroke-width="1"/>

  <!-- ═══ OLHOS VERMELHOS ═══ -->
  <!-- Olho esquerdo -->
  <circle cx="27" cy="17" r="4" fill="#1A1A2A" stroke="#3A3A4A" stroke-width="1"/>
  <circle cx="27" cy="17" r="2.5" fill="#CC2222"/>
  <circle cx="27" cy="17" r="1.5" fill="#FF4444"/>
  <circle cx="26" cy="16" r="0.8" fill="#FF8888" opacity="0.8"/>
  <!-- Olho direito -->
  <circle cx="37" cy="17" r="4" fill="#1A1A2A" stroke="#3A3A4A" stroke-width="1"/>
  <circle cx="37" cy="17" r="2.5" fill="#CC2222"/>
  <circle cx="37" cy="17" r="1.5" fill="#FF4444"/>
  <circle cx="36" cy="16" r="0.8" fill="#FF8888" opacity="0.8"/>

  <!-- ═══ SAÍDAS DE VAPOR (lados do barril) ═══ -->
  <circle cx="10" cy="35" r="2" fill="#2A2A3A" stroke="#1A1A2A" stroke-width="1"/>
  <circle cx="54" cy="35" r="2" fill="#2A2A3A" stroke="#1A1A2A" stroke-width="1"/>

  <!-- Tampa superior do barril (pescoço) -->
  <ellipse cx="32" cy="22" rx="15" ry="4" fill="#6A6A7E" stroke="#2A2A3A" stroke-width="1.5"/>

</svg>
