name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz
        run: |
          git clone --depth 1 --branch v4.5.2 https://github.com/jackyzha0/quartz.git quartz-build

      - name: Copy custom config
        run: |
          cp Projects/second-brain-pipeline/quartz/quartz.config.ts quartz-build/quartz.config.ts

      - name: Sync vault content
        run: |
          CONTENT_DIR="quartz-build/content"
          mkdir -p "$CONTENT_DIR"

          cp -r "Links Salvos" "$CONTENT_DIR/" 2>/dev/null || true
          cp -r "Conceitos" "$CONTENT_DIR/" 2>/dev/null || true
          cp -r "MOCs" "$CONTENT_DIR/" 2>/dev/null || true

          cat > "$CONTENT_DIR/index.md" << 'INDEXEOF'
          ---
          title: Observatorio
          ---
          # Observatorio

          Base de conhecimento pessoal.
          INDEXEOF

          echo "Content synced. Files:"
          find "$CONTENT_DIR" -name "*.md" | wc -l

      - name: Install Dependencies
        run: npm ci
        working-directory: quartz-build

      - name: Build Quartz
        run: npx quartz build
        working-directory: quartz-build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz-build/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
