<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- ═══ CABELO SELVAGEM (atras, embaixo de tudo) ═══ -->
  <!-- massa de cabelo explodindo para os lados -->
  <ellipse cx="32" cy="14" rx="17" ry="13" fill="#D8D8CF"/>
  <!-- mechas para os lados -->
  <path d="M15 12 Q8 8 10 16 Q13 14 15 18" fill="#D8D8CF"/>
  <path d="M49 12 Q56 8 54 16 Q51 14 49 18" fill="#D8D8CF"/>
  <!-- mechas para cima (caoticamente) -->
  <path d="M26 5 Q24 0 28 3 Q27 1 30 4" fill="#D8D8CF" stroke="#AAAAAA" stroke-width="0.5"/>
  <path d="M32 3 Q31 -1 34 2" fill="#D8D8CF" stroke="#AAAAAA" stroke-width="0.5"/>
  <path d="M37 5 Q39 0 36 3" fill="#D8D8CF" stroke="#AAAAAA" stroke-width="0.5"/>
  <!-- textura de cabelo (linhas) -->
  <path d="M18 10 Q22 6 28 8" fill="none" stroke="#AAAAAA" stroke-width="0.8"/>
  <path d="M46 10 Q42 6 36 8" fill="none" stroke="#AAAAAA" stroke-width="0.8"/>

  <!-- ═══ JALECO (corpo) ═══ -->
  <!-- jaleco longo e amarrotado -->
  <rect x="16" y="30" width="32" height="28" rx="4" fill="#F0EAD6" stroke="#2A2A2A" stroke-width="1.5"/>
  <!-- lapelas do jaleco -->
  <path d="M28 30 L24 38 L28 36 Z" fill="#E8E0CC" stroke="#2A2A2A" stroke-width="1"/>
  <path d="M36 30 L40 38 L36 36 Z" fill="#E8E0CC" stroke="#2A2A2A" stroke-width="1"/>
  <!-- MANCHAS DE TERRA nos cotovelos -->
  <ellipse cx="18" cy="42" rx="4" ry="3" fill="#7A4A1E" opacity="0.6"/>
  <ellipse cx="46" cy="42" rx="4" ry="3" fill="#7A4A1E" opacity="0.6"/>
  <!-- MANCHAS VERDES (extratos) nas lapelas -->
  <ellipse cx="24" cy="34" rx="2.5" ry="1.5" fill="#5C7A3E" opacity="0.7"/>
  <ellipse cx="40" cy="34" rx="2" ry="1.5" fill="#5C7A3E" opacity="0.7"/>
  <!-- queimadura laranja lado esquerdo -->
  <ellipse cx="20" cy="46" rx="2" ry="3" fill="#C4622D" opacity="0.5"/>
  <!-- remendo no ombro direito -->
  <rect x="38" y="31" width="7" height="5" rx="1" fill="#B8956A" opacity="0.8" stroke="#8A6A3A" stroke-width="0.5"/>

  <!-- ═══ BOLSO PEITO — MUDA BROTANDO ═══ -->
  <rect x="28" y="33" width="8" height="6" rx="1" fill="#DDDACC" stroke="#2A2A2A" stroke-width="1"/>
  <!-- caule da muda -->
  <line x1="32" y1="39" x2="32" y2="33" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- folhinhas da muda -->
  <ellipse cx="30" cy="33" rx="2.5" ry="1.5" fill="#4CAF50" transform="rotate(-30 30 33)"/>
  <ellipse cx="34" cy="33" rx="2.5" ry="1.5" fill="#388E3C" transform="rotate(30 34 33)"/>
  <ellipse cx="32" cy="31" rx="2" ry="1.5" fill="#66BB6A"/>

  <!-- ═══ BOLSO LATERAL ESQUERDO — FOLHAS ═══ -->
  <rect x="17" y="45" width="8" height="7" rx="1" fill="#DDDACC" stroke="#2A2A2A" stroke-width="1"/>
  <!-- folhas saindo do bolso -->
  <path d="M19 45 Q17 40 20 41 Q18 43 19 45 Z" fill="#558B2F"/>
  <path d="M22 45 Q21 39 24 41 Q22 43 22 45 Z" fill="#7CB342"/>

  <!-- ═══ BOLSO LATERAL DIREITO — TUBO DE ENSAIO ═══ -->
  <rect x="39" y="45" width="8" height="7" rx="1" fill="#DDDACC" stroke="#2A2A2A" stroke-width="1"/>
  <!-- tubo de ensaio -->
  <rect x="42" y="41" width="3" height="8" rx="1.5" fill="#A5D6A7" stroke="#2A2A2A" stroke-width="0.8"/>
  <rect x="42" y="41" width="3" height="3" rx="1" fill="#C8E6C9" opacity="0.8"/>
  <!-- bolha no tubo -->
  <circle cx="43" cy="48" r="1" fill="#1B5E20" opacity="0.7"/>

  <!-- ═══ PESCOÇO ═══ -->
  <rect x="28" y="25" width="8" height="6" rx="2" fill="#F5CBA7" stroke="#2A2A2A" stroke-width="1.5"/>

  <!-- ═══ CABEÇA ═══ -->
  <ellipse cx="32" cy="18" rx="11" ry="10" fill="#F5CBA7" stroke="#2A2A2A" stroke-width="1.5"/>

  <!-- folha presa no cabelo (detalhe) -->
  <path d="M22 12 Q19 9 23 10 Q21 11 22 12 Z" fill="#8BC34A"/>

  <!-- ═══ ÓCULOS ENORMES ═══ -->
  <!-- aros dourados -->
  <circle cx="27" cy="19" r="5" fill="none" stroke="#C8A84B" stroke-width="1.8"/>
  <circle cx="37" cy="19" r="5" fill="none" stroke="#C8A84B" stroke-width="1.8"/>
  <!-- ponte dos óculos -->
  <line x1="32" y1="19" x2="32" y2="19" stroke="#C8A84B" stroke-width="1.8"/>
  <path d="M32 18 Q32 17 32 18" fill="none" stroke="#C8A84B" stroke-width="2"/>
  <!-- hastes -->
  <line x1="22" y1="17" x2="20" y2="15" stroke="#C8A84B" stroke-width="1.5"/>
  <line x1="42" y1="17" x2="44" y2="15" stroke="#C8A84B" stroke-width="1.5"/>
  <!-- lentes (reflexo) -->
  <circle cx="27" cy="19" r="4" fill="#E8F4FD" opacity="0.4"/>
  <circle cx="37" cy="19" r="4" fill="#E8F4FD" opacity="0.4"/>
  <!-- brilho das lentes -->
  <circle cx="25" cy="17" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="35" cy="17" r="1.2" fill="white" opacity="0.8"/>
  <!-- olhos atrás dos óculos -->
  <circle cx="27" cy="19" r="2.5" fill="#3E2723"/>
  <circle cx="37" cy="19" r="2.5" fill="#3E2723"/>
  <circle cx="27.8" cy="18.2" r="1" fill="white"/>
  <circle cx="37.8" cy="18.2" r="1" fill="white"/>

  <!-- ═══ SORRISO MANÍACO ═══ -->
  <path d="M26 24 Q32 29 38 24" fill="none" stroke="#2A2A2A" stroke-width="1.8" stroke-linecap="round"/>
  <!-- dentes (entusiasmado demais) -->
  <path d="M27.5 25 Q32 28.5 36.5 25 L36 26 Q32 29.5 28 26 Z" fill="white" stroke="#CCCCCC" stroke-width="0.3"/>

  <!-- ═══ BRAÇOS ═══ -->
  <rect x="8" y="31" width="8" height="18" rx="4" fill="#F0EAD6" stroke="#2A2A2A" stroke-width="1.5"/>
  <rect x="48" y="31" width="8" height="18" rx="4" fill="#F0EAD6" stroke="#2A2A2A" stroke-width="1.5"/>
  <!-- manchas terra nos braços -->
  <ellipse cx="10" cy="44" rx="2.5" ry="2" fill="#7A4A1E" opacity="0.5"/>
  <!-- mãos -->
  <circle cx="12" cy="51" r="4.5" fill="#F5CBA7" stroke="#2A2A2A" stroke-width="1.5"/>
  <circle cx="52" cy="51" r="4.5" fill="#F5CBA7" stroke="#2A2A2A" stroke-width="1.5"/>
  <!-- terra nas unhas / dedos -->
  <path d="M9 51 Q12 54 15 51" fill="none" stroke="#7A4A1E" stroke-width="0.8" opacity="0.7"/>

  <!-- ═══ PERNAS ═══ -->
  <rect x="21" y="57" width="9" height="6" rx="3" fill="#4A5A6A" stroke="#2A2A2A" stroke-width="1.5"/>
  <rect x="34" y="57" width="9" height="6" rx="3" fill="#4A5A6A" stroke="#2A2A2A" stroke-width="1.5"/>
  <!-- botas com terra -->
  <rect x="20" y="60" width="11" height="4" rx="2" fill="#3A2A1A" stroke="#2A2A2A" stroke-width="1"/>
  <rect x="33" y="60" width="11" height="4" rx="2" fill="#3A2A1A" stroke="#2A2A2A" stroke-width="1"/>

</svg>
