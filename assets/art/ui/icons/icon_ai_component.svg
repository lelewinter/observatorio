<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="chip_bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0C2418"/>
      <stop offset="100%" stop-color="#060C0E"/>
    </radialGradient>
    <radialGradient id="core_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="60%" stop-color="#00CC66" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00AA55" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="core_filter" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Circuit trace paths (behind chip) -->
  <!-- Top traces -->
  <line x1="11" y1="1.5" x2="11" y2="7" stroke="#005533" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="16" y1="1.5" x2="16" y2="7" stroke="#005533" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="21" y1="1.5" x2="21" y2="7" stroke="#005533" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Bottom traces -->
  <line x1="11" y1="25" x2="11" y2="30.5" stroke="#005533" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="16" y1="25" x2="16" y2="30.5" stroke="#005533" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="21" y1="25" x2="21" y2="30.5" stroke="#005533" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Left traces -->
  <line x1="1.5" y1="11" x2="7" y2="11" stroke="#005533" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="1.5" y1="16" x2="7" y2="16" stroke="#005533" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="1.5" y1="21" x2="7" y2="21" stroke="#005533" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Right traces -->
  <line x1="25" y1="11" x2="30.5" y2="11" stroke="#005533" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="25" y1="16" x2="30.5" y2="16" stroke="#005533" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="25" y1="21" x2="30.5" y2="21" stroke="#005533" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Pin endpoint dots -->
  <circle cx="11" cy="1.5" r="1.5" fill="#00BB66"/>
  <circle cx="16" cy="1.5" r="1.5" fill="#00BB66"/>
  <circle cx="21" cy="1.5" r="1.5" fill="#00BB66"/>
  <circle cx="11" cy="30.5" r="1.5" fill="#00BB66"/>
  <circle cx="16" cy="30.5" r="1.5" fill="#00BB66"/>
  <circle cx="21" cy="30.5" r="1.5" fill="#00BB66"/>
  <circle cx="1.5" cy="11" r="1.5" fill="#00BB66"/>
  <circle cx="1.5" cy="16" r="1.5" fill="#00BB66"/>
  <circle cx="1.5" cy="21" r="1.5" fill="#00BB66"/>
  <circle cx="30.5" cy="11" r="1.5" fill="#00BB66"/>
  <circle cx="30.5" cy="16" r="1.5" fill="#00BB66"/>
  <circle cx="30.5" cy="21" r="1.5" fill="#00BB66"/>

  <!-- Chip body -->
  <rect x="7" y="7" width="18" height="18" rx="2.5" fill="url(#chip_bg)"/>
  <rect x="7" y="7" width="18" height="18" rx="2.5" fill="none" stroke="#00EE77" stroke-width="1.3" filter="url(#neon)"/>

  <!-- Inner circuit ring -->
  <rect x="10" y="10" width="12" height="12" rx="1.5" fill="none" stroke="#007744" stroke-width="0.9"/>

  <!-- Corner contact pads -->
  <rect x="8.5" y="8.5" width="2.5" height="2.5" rx="0.5" fill="#009955"/>
  <rect x="21" y="8.5" width="2.5" height="2.5" rx="0.5" fill="#009955"/>
  <rect x="8.5" y="21" width="2.5" height="2.5" rx="0.5" fill="#009955"/>
  <rect x="21" y="21" width="2.5" height="2.5" rx="0.5" fill="#009955"/>

  <!-- Internal trace cross -->
  <line x1="16" y1="10.5" x2="16" y2="13" stroke="#006633" stroke-width="0.8"/>
  <line x1="16" y1="19" x2="16" y2="21.5" stroke="#006633" stroke-width="0.8"/>
  <line x1="10.5" y1="16" x2="13" y2="16" stroke="#006633" stroke-width="0.8"/>
  <line x1="19" y1="16" x2="21.5" y2="16" stroke="#006633" stroke-width="0.8"/>

  <!-- Core glow aura -->
  <circle cx="16" cy="16" r="5" fill="url(#core_glow)" opacity="0.6"/>
  <!-- Core node -->
  <circle cx="16" cy="16" r="3.5" fill="#001A0D" stroke="#00FF88" stroke-width="1.2" filter="url(#neon)"/>
  <circle cx="16" cy="16" r="2" fill="#00FF88" opacity="0.95" filter="url(#core_filter)"/>
  <circle cx="16" cy="16" r="1" fill="#CCFFEE"/>
</svg>
